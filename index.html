<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>可爱虾蛋菜谱 - 美味动漫世界</title>
    <link rel="stylesheet" href="./assets/css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <!-- 页面加载动画 -->
    <div id="loadingScreen" class="loading-screen">
        <div class="loading-content">
            <div class="loading-icon">🦐</div>
            <div class="loading-text">正在准备美味...</div>
        </div>
    </div>

    <!-- 主应用容器 -->
    <div id="app" class="app-container">
        <!-- 头部区域 -->
        <header class="header">
            <div class="header-content">
                <div class="logo">
                    <span class="logo-icon">🍤</span>
                    <h1 class="logo-text">可爱虾蛋菜谱</h1>
                </div>
                <button class="add-recipe-btn" onclick="openAddForm()">
                    <span class="btn-icon">+</span>
                    <span class="btn-text">添加菜谱</span>
                </button>
            </div>
        </header>

        <!-- 主内容区域 -->
        <main class="main-content">
            <!-- 搜索和筛选区域 -->
            <section class="search-section">
                <div class="search-container">
                    <div class="search-box">
                        <span class="search-icon">🔍</span>
                        <input type="text" id="searchInput" placeholder="搜索美味菜谱..." class="search-input">
                        <button class="clear-search" onclick="clearSearch()" style="display: none;">×</button>
                    </div>
                    <div class="sort-controls">
                        <select id="sortSelect" class="sort-select">
                            <option value="createdAt-desc">最新发布</option>
                            <option value="createdAt-asc">最早发布</option>
                            <option value="cookingTime-asc">用时最短</option>
                            <option value="cookingTime-desc">用时最长</option>
                            <option value="calories-asc">卡路里最低</option>
                            <option value="calories-desc">卡路里最高</option>
                            <option value="name-asc">名称A-Z</option>
                            <option value="name-desc">名称Z-A</option>
                        </select>
                    </div>
                </div>
            </section>

            <!-- 菜谱网格 -->
            <section class="recipes-section">
                <div id="recipesGrid" class="recipes-grid">
                    <!-- 菜谱卡片将在这里动态生成 -->
                </div>
                
                <!-- 空状态 -->
                <div id="emptyState" class="empty-state" style="display: none;">
                    <div class="empty-icon">🥚</div>
                    <h3 class="empty-title">还没有菜谱呢</h3>
                    <p class="empty-text">快来添加第一个虾蛋菜谱吧！</p>
                    <button class="empty-btn" onclick="openAddForm()">
                        <span class="btn-icon">+</span>
                        添加第一个菜谱
                    </button>
                </div>
            </section>
        </main>

        <!-- 数据管理区域 -->
        <section class="data-management">
            <div class="data-controls">
                <button class="data-btn" onclick="exportData()">
                    <span class="btn-icon">📤</span>
                    导出数据
                </button>
                <button class="data-btn" onclick="importData()">
                    <span class="btn-icon">📥</span>
                    导入数据
                </button>
                <input type="file" id="importFile" accept=".json" style="display: none;" onchange="handleFileImport(event)">
            </div>
        </section>
    </div>

    <!-- 添加/编辑菜谱模态框 -->
    <div id="recipeModal" class="modal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">添加新菜谱</h2>
                <button class="close-btn" onclick="closeModal()">&times;</button>
            </div>
            
            <form id="recipeForm" class="recipe-form">
                <div class="form-section">
                    <label class="form-label">菜名 *</label>
                    <input type="text" id="recipeName" class="form-input" placeholder="给这道菜起个可爱的名字" maxlength="50" required>
                    <span class="error-message" id="nameError"></span>
                </div>

                <div class="form-section">
                    <label class="form-label">菜品图片</label>
                    <div class="image-upload-area" id="imageUploadArea">
                        <div class="upload-placeholder">
                            <div class="upload-icon">📸</div>
                            <p class="upload-text">点击或拖拽上传图片</p>
                            <p class="upload-hint">支持 JPG、PNG、GIF，最大 10MB</p>
                        </div>
                        <input type="file" id="imageInput" accept="image/*" style="display: none;">
                        <div class="image-preview" id="imagePreview" style="display: none;">
                            <img id="previewImage" alt="菜品预览">
                            <button type="button" class="remove-image" onclick="removeImage()">×</button>
                        </div>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-section">
                        <label class="form-label">烹饪时长 *（分钟）</label>
                        <input type="number" id="cookingTime" class="form-input" placeholder="30" min="1" max="999" required>
                    </div>
                    <div class="form-section">
                        <label class="form-label">卡路里（千卡）</label>
                        <input type="number" id="calories" class="form-input" placeholder="250" min="0" max="9999">
                    </div>
                </div>

                <div class="form-section">
                    <label class="form-label">用料清单 *</label>
                    <div class="ingredients-list" id="ingredientsList">
                        <div class="ingredient-item">
                            <input type="text" class="ingredient-name" placeholder="食材名称" required>
                            <input type="text" class="ingredient-amount" placeholder="用量" required>
                            <button type="button" class="remove-ingredient" onclick="removeIngredient(this)">×</button>
                        </div>
                    </div>
                    <button type="button" class="add-ingredient-btn" onclick="addIngredient()">
                        <span class="btn-icon">+</span>
                        添加食材
                    </button>
                </div>

                <div class="form-section">
                    <label class="form-label">详细做法 *</label>
                    <textarea id="instructions" class="form-textarea" placeholder="详细描述烹饪步骤，可以分步骤写哦～" rows="6" required></textarea>
                </div>

                <div class="form-actions">
                    <button type="button" class="btn-secondary" onclick="closeModal()">取消</button>
                    <button type="submit" class="btn-primary">
                        <span class="btn-icon">💾</span>
                        保存菜谱
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- 菜谱详情模态框 -->
    <div id="detailModal" class="modal" style="display: none;">
        <div class="modal-content detail-modal">
            <div class="modal-header">
                <h2 id="detailTitle">菜谱详情</h2>
                <button class="close-btn" onclick="closeDetailModal()">&times;</button>
            </div>
            
            <div class="detail-content" id="detailContent">
                <!-- 详情内容将动态生成 -->
            </div>
            
            <div class="detail-actions">
                <button class="btn-secondary" onclick="closeDetailModal()">关闭</button>
                <button class="btn-primary" onclick="editRecipe()">
                    <span class="btn-icon">✏️</span>
                    编辑
                </button>
                <button class="btn-danger" onclick="deleteRecipe()">
                    <span class="btn-icon">🗑️</span>
                    删除
                </button>
            </div>
        </div>
    </div>

    <!-- 确认对话框 -->
    <div id="confirmModal" class="modal confirm-modal" style="display: none;">
        <div class="modal-content confirm-content">
            <div class="confirm-header">
                <h3 id="confirmTitle">确认删除</h3>
            </div>
            <p id="confirmMessage">确定要删除这个菜谱吗？此操作无法撤销。</p>
            <div class="confirm-actions">
                <button class="btn-secondary" onclick="cancelDelete()">取消</button>
                <button class="btn-danger" onclick="confirmDelete()">确认删除</button>
            </div>
        </div>
    </div>

    <!-- 提示消息 -->
    <div id="toast" class="toast" style="display: none;">
        <div class="toast-content">
            <span class="toast-icon" id="toastIcon">✨</span>
            <span class="toast-message" id="toastMessage">操作成功！</span>
        </div>
    </div>

    <script src="./assets/js/main.js"></script>
</body>
</html>
